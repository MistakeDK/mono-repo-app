name: Deploy developer-toolkit to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-developer-toolkit
  cancel-in-progress: true

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  NX_DAEMON: 'false'
  NEXT_PUBLIC_BASE_PATH: /mono-repo-app

jobs:
  deploy:
    name: Restore Nx Cloud output and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore developer-toolkit export from Nx Cloud
        run: pnpm exec nx build @mono/developer-toolkit

      - name: Resolve static export path
        id: export-path
        run: |
          for candidate in \
            "apps/developer-toolkit/out" \
            "dist/apps/developer-toolkit/out" \
            "dist/apps/developer-toolkit/exported" \
            "dist/apps/developer-toolkit"; do
            if [ -d "$candidate" ] && [ -f "$candidate/index.html" ]; then
              echo "path=$candidate" >> "$GITHUB_OUTPUT"
              touch "$candidate/.nojekyll"
              exit 0
            fi
          done

          echo "::error::Could not find a static export containing index.html. Ensure the developer-toolkit build is cached in Nx Cloud for this commit and next.config.js uses output: 'export'."
          find apps/developer-toolkit dist -maxdepth 3 -type d 2>/dev/null | sort
          exit 1

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.export-path.outputs.path }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
